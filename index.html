<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chúc Mừng Sinh Nhật Em</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <div class="stars" id="stars"></div>
  <div class="heart-rain" id="heart-rain"></div>

  <main class="hero">
    <section class="birthday-card">
      <p class="eyebrow">🎀 Gửi đến người đặc biệt 🎀</p>
      <h1>Chúc Mừng Sinh Nhật Em</h1>
      <p class="message">
        Chúc bạn một ngày thật <span>rực rỡ</span>, ngập tràn tiếng cười,
        niềm vui và những điều ngọt ngào nhất! 💖
      </p>

      <div class="badges">
        <span>🎂 Ngập tràn yêu thương</span>
        <span>✨ May mắn cả năm</span>
        <span>💝 Hạnh phúc mỗi ngày</span>
      </div>

      <div class="actions">
        <button id="celebrateBtn">Bấm để nhận mưa tim 💘</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
